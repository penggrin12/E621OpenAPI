    get:
      summary: Search Forum Posts
      operationId: searchForumPosts
      tags:
        - Forum Posts
      description: 'When no results are found, an object with an `forum_posts` key is returned.'
      parameters:
        - name: limit
          in: query
          description: The maximum number of results to return. Between 0 and 320.
          schema:
            type: integer
            minimum: 0
            maximum: 500
        - name: page
          in: query
          description: The page number of results to get. Between 1 and 750.
          schema:
            type: integer
            minimum: 1
            maximum: 750
        - name: 'search[id]'
          in: query
          description: Search for a specific id.
          schema:
            type: integer
        - name: 'search[order]'
          in: query
          schema:
            type: string
            enum:
              - id_asc
              - id_desc
        - in: query
          name: 'search[creator_id]'
          schema:
            type: integer
        - in: query
          name: 'search[creator_name]'
          schema:
            type: string
        - in: query
          name: 'search[topic_id]'
          schema:
            type: integer
        - in: query
          name: 'search[topic_title_matches]'
          schema:
            type: string
        - in: query
          name: 'search[body_matches]'
          schema:
            type: string
        - in: query
          name: 'search[topic_category_id]'
          schema:
            type: integer
        - in: query
          name: 'search[is_hidden]'
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                anyOf:
                  - type: array
                    items:
                      type: object
                      required:
                        - id
                        - topic_id
                        - creator_id
                        - updater_id
                        - body
                        - is_hidden
                        - created_at
                        - updated_at
                        - warning_type
                        - warning_user_id
                      properties:
                        id:
                          type: integer
                        topic_id:
                          type: integer
                        creator_id:
                          type: integer
                        updater_id:
                          type: integer
                        body:
                          type: string
                        is_hidden:
                          type: boolean
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        warning_type:
                          type: string
                          enum:
                            - warning
                            - record
                            - ban
                        warning_user_id:
                          type: integer
                          nullable: true
                  - type: object
                    description: No Results
                    required:
                      - forum_posts
                    properties:
                      forum_posts:
                        type: array
                        maxItems: 0
