  /uploads.json:
    get:
      summary: Search Uploads
      operationId: searchUploads
      tags:
        - Uploads
      description: 'You must be Janitor+. When no results are found, an object with an `uploads` key is returned.'
      parameters:
        - name: limit
          in: query
          description: The maximum number of results to return. Between 0 and 320.
          schema:
            type: integer
            minimum: 0
            maximum: 500
        - name: page
          in: query
          description: The page number of results to get. Between 1 and 750.
          schema:
            type: integer
            minimum: 1
            maximum: 750
        - name: 'search[id]'
          in: query
          description: Search for a specific id.
          schema:
            type: integer
        - name: 'search[order]'
          in: query
          schema:
            type: string
            enum:
              - id_asc
              - id_desc
        - in: query
          name: 'search[uploader_id]'
          schema:
            type: integer
        - in: query
          name: 'search[uploader_name]'
          schema:
            type: string
        - in: query
          name: 'search[source]'
          schema:
            type: string
        - in: query
          name: 'search[source_matches]'
          schema:
            type: string
        - in: query
          name: 'search[rating]'
          schema:
            type: string
            enum:
              - s
              - q
              - e
        - in: query
          name: 'search[parent_id]'
          schema:
            type: integer
        - in: query
          name: 'search[post_id]'
          schema:
            type: integer
        - in: query
          name: 'search[has_post]'
          schema:
            type: boolean
        - in: query
          name: 'search[post_tags_match]'
          schema:
            type: string
        - in: query
          name: 'search[status]'
          schema:
            type: string
            description: |
              Note: The "error" status will be proceeded by an error, ex: "error: RuntimeError - No file or source URL provided"
            enum:
              - completed
              - processing
              - pending
              - error
        - in: query
          name: 'search[backtrace]'
          schema:
            type: string
        - in: query
          name: 'search[tag_string]'
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                anyOf:
                  - type: array
                    items:
                      type: object
                      required:
                        - id
                        - source
                        - rating
                        - uploader_id
                        - tag_string
                        - status
                        - backtrace
                        - post_id
                        - md5_confirmation
                        - created_at
                        - updated_at
                        - parent_id
                        - md5
                        - file_ext
                        - file_size
                        - image_width
                        - image_height
                        - description
                        - uploader_name
                      properties:
                        id:
                          type: integer
                        source:
                          type: string
                        rating:
                          type: string
                          enum:
                            - s
                            - q
                            - e
                        uploader_id:
                          type: integer
                        tag_string:
                          type: string
                        status:
                          type: string
                          description: |
                            Note: The "error" status will be proceeded by an error, ex: "error: RuntimeError - No file or source URL provided"
                          enum:
                            - completed
                            - duplicate
                            - error
                            - processing
                            - pending
                        backtrace:
                          type: string
                          nullable: true
                        post_id:
                          type: integer
                          nullable: true
                        md5_confirmation:
                          type: string
                          nullable: true
                          deprecated: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        parent_id:
                          type: integer
                          nullable: true
                        md5:
                          type: string
                          nullable: true
                        file_ext:
                          type: string
                          nullable: true
                        file_size:
                          type: integer
                          nullable: true
                        image_width:
                          type: integer
                          nullable: true
                        image_height:
                          type: integer
                          nullable: true
                        description:
                          type: string
                        uploader_name:
                          type: string
                  - type: object
                    description: No Results
                    required:
                      - uploads
                    properties:
                      uploads:
                        type: array
                        maxItems: 0
    post:
      summary: Upload Post
      operationId: uploadPost
      tags:
        - Uploads
        - Posts
      security:
        - basicAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - 'upload[tag_string]'
                - 'upload[rating]'
              properties:
                'upload[file]':
                  type: string
                  format: binary
                  description: Mutually exclusive with direct_url.
                'upload[direct_url]':
                  type: string
                  description: Mutually exclusive with file.
                'upload[source]':
                  type: string
                'upload[tag_string]':
                  type: string
                'upload[rating]':
                  type: string
                  enum:
                    - s
                    - q
                    - e
                'upload[parent_id]':
                  type: integer
                'upload[description]':
                  type: string
                'upload[as_pending]':
                  type: boolean
                  description: Must have the "Unrestricted Uploads" permission.
                'upload[locked_rating]':
                  type: boolean
                  description: Must be Privileged+ to use.
                'upload[locked_tags]':
                  type: string
                  description: Must be Admin+ to use.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - location
                  - post_id
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  location:
                    type: string
                  post_id:
                    type: integer
        '403':
          description: Access Denied
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - reason
                properties:
                  success:
                    type: boolean
                  reason:
                    type: string
                    enum:
                      - Access Denied
        '412':
          description: Error
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  code:
                    type: string
                    nullable: true
