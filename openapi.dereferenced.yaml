paths:
  /artists.json:
    get:
      summary: Search Artists
      operationId: searchArtists
      tags:
        - Artists
      parameters:
        - name: limit
          in: query
          description: The maximum number of results to return. Between 0 and 320.
          schema:
            type: integer
            minimum: 0
            maximum: 500
        - name: page
          in: query
          description: The page number of results to get. Between 1 and 750.
          schema:
            type: integer
            minimum: 1
            maximum: 750
        - name: 'search[id]'
          in: query
          description: Search for a specific id.
          schema:
            type: integer
        - name: 'search[order]'
          in: query
          schema:
            type: string
            enum:
              - id_asc
              - id_desc
              - updated_at
              - name
              - post_count
        - name: 'search[name]'
          in: query
          schema:
            type: string
        - name: 'search[group_name]'
          in: query
          schema:
            type: string
        - name: 'search[any_other_name_like]'
          in: query
          schema:
            type: string
        - name: 'search[any_name_matches]'
          in: query
          schema:
            type: string
        - name: 'search[any_name_or_url_matches]'
          in: query
          schema:
            type: string
        - name: 'search[url_matches]'
          in: query
          schema:
            type: string
        - name: 'search[creator_name]'
          in: query
          schema:
            type: string
        - name: 'search[creator_id]'
          in: query
          schema:
            type: string
        - name: 'search[has_tag]'
          in: query
          schema:
            type: string
        - name: 'search[is_linked]'
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - type: object
                      required:
                        - id
                        - name
                        - updated_at
                        - is_active
                        - other_names
                        - group_name
                        - linked_user_id
                        - created_at
                        - creator_id
                        - is_locked
                        - notes
                        - urls
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        updated_at:
                          type: string
                          format: date-time
                        is_active:
                          type: boolean
                        other_names:
                          type: array
                          items:
                            type: string
                        group_name:
                          type: string
                        linked_user_id:
                          type: integer
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                        creator_id:
                          type: integer
                        is_locked:
                          type: boolean
                        notes:
                          type: string
                          nullable: true
                    - type: object
                      required:
                        - domains
                        - urls
                      properties:
                        domains:
                          type: array
                          example:
                            - - e621.net
                              - 1
                          items:
                            type: array
                            items:
                              anyOf:
                                - type: string
                                - type: number
                        urls:
                          type: array
                          items:
                            type: object
                            required:
                              - id
                              - artist_id
                              - url
                              - normalized_url
                              - created_at
                              - updated_at
                              - is_active
                            properties:
                              id:
                                type: integer
                              artist_id:
                                type: integer
                              url:
                                type: string
                                format: uri
                              normalized_url:
                                type: string
                                format: uri
                              created_at:
                                type: string
                                format: date-time
                              updated_at:
                                type: string
                                format: date-time
                              is_active:
                                type: boolean
    post:
      summary: Create Artist
      operationId: createArtist
      tags:
        - Artists
      security:
        - basicAuth: []
      description: |
        `other_names` & `urls` are silently truncated to 25 entries.
        `notes` is silently truncated to the wiki page limit (250,000).
        Individual `other_names` are silently truncated to 100 characters.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - 'artist[name]'
              properties:
                'artist[name]':
                  type: string
                'artist[other_names]':
                  type: array
                  items:
                    type: string
                'artist[other_names_string]':
                  type: string
                'artist[url_string]':
                  type: string
                'artist[notes]':
                  type: string
                'artist[group_name]':
                  type: string
                'artist[linked_user_id]':
                  type: integer
                  nullable: true
                  description: Only usable for Janitor+
                'artist[is_locked]':
                  type: boolean
                  description: Only usable for Janitor+
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                  - updated_at
                  - is_active
                  - other_names
                  - group_name
                  - linked_user_id
                  - created_at
                  - creator_id
                  - is_locked
                  - notes
                  - urls
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  updated_at:
                    type: string
                    format: date-time
                  is_active:
                    type: boolean
                  other_names:
                    type: array
                    items:
                      type: string
                  group_name:
                    type: string
                  linked_user_id:
                    type: integer
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
                  creator_id:
                    type: integer
                  is_locked:
                    type: boolean
                  notes:
                    type: string
                    nullable: true
        '403':
          description: Access Denied
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - reason
                properties:
                  success:
                    type: boolean
                  reason:
                    type: string
                    enum:
                      - Access Denied
        '422':
          description: Invalid Input Data
          content:
            application/json:
              schema:
                type: object
                required:
                  - errors
                example:
                  - errors:
                      key:
                        - the error
                properties:
                  errors:
                    type: array
                    items:
                      type: string
