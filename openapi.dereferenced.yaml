    get:
      summary: Search Comments
      operationId: searchComments
      tags:
        - Comments
      description: 'For searching comments, group_by=comment must be set. When no results are found, an object with an `comments` key is returned.'
      parameters:
        - name: limit
          in: query
          description: The maximum number of results to return. Between 0 and 320.
          schema:
            type: integer
            minimum: 0
            maximum: 500
        - name: page
          in: query
          description: The page number of results to get. Between 1 and 750.
          schema:
            type: integer
            minimum: 1
            maximum: 750
        - name: 'search[id]'
          in: query
          description: Search for a specific id.
          schema:
            type: integer
        - name: 'search[ip_addr]'
          in: query
          description: 'Must be Admin+ to use. See [postgres'' documentation](https://www.postgresql.org/docs/9.3/functions-net.html) for information on how this is parsed. Specifically, "is contained within or equals" (`<<=`).'
          schema:
            type: string
        - name: 'search[order]'
          in: query
          schema:
            type: string
            enum:
              - id_asc
              - id_desc
              - status
              - status_desc
              - updated_at_desc
        - in: query
          name: group_by
          schema:
            type: string
            enum:
              - comment
              - post
        - in: query
          name: 'search[body_matches]'
          schema:
            type: string
        - in: query
          name: 'search[post_id]'
          description: Accepts a comma separated list.
          schema:
            type: string
        - in: query
          name: 'search[post_tags_match]'
          schema:
            type: string
        - in: query
          name: 'search[post_note_updater_name]'
          schema:
            type: string
        - in: query
          name: 'search[post_note_updater_id]'
          schema:
            type: integer
        - in: query
          name: 'search[creator_name]'
          schema:
            type: string
        - in: query
          name: 'search[creator_id]'
          schema:
            type: integer
        - in: query
          name: 'search[is_sticky]'
          schema:
            type: boolean
        - in: query
          name: 'search[is_hidden]'
          description: Only usable by Moderator+
          schema:
            type: boolean
        - in: query
          name: 'search[do_not_bump_post]'
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                anyOf:
                  - type: array
                    items:
                      type: object
                      required:
                        - id
                        - created_at
                        - post_id
                        - creator_id
                        - body
                        - score
                        - updated_at
                        - updater_id
                        - do_not_bump_post
                        - is_hidden
                        - is_sticky
                        - warning_type
                        - warning_user_id
                        - creator_name
                        - updater_name
                      properties:
                        id:
                          type: integer
                        created_at:
                          type: string
                          format: date-time
                        post_id:
                          type: integer
                        creator_id:
                          type: integer
                        body:
                          type: string
                        score:
                          type: integer
                        updated_at:
                          type: string
                          format: date-time
                        updater_id:
                          type: integer
                        do_not_bump_post:
                          type: boolean
                          deprecated: true
                        is_hidden:
                          type: boolean
                        is_sticky:
                          type: boolean
                        warning_type:
                          type: string
                          enum:
                            - warning
                            - record
                            - ban
                        warning_user_id:
                          type: integer
                          nullable: true
                        creator_name:
                          type: string
                        updater_name:
                          type: string
                  - type: object
                    description: No Results
                    required:
                      - comments
                    properties:
                      comments:
                        type: array
                        maxItems: 0
