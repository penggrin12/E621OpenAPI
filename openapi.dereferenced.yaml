openapi: 3.0.0
info:
  title: E621
  description: |
    OpenAPI definition for E621's API. You can find the source [here](https://github.com/DonovanDMC/E621OpenAPI)<br>
    This document is intended to compliment E621's existing [API Documentation](https://e621.net/help/api).<br>
    If the api is not working, you can check this [Unofficial Status Page](https://status.e621.church).
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  termsOfService: 'https://e621.net/static/terms_of_service'
  contact:
    name: Donovan_DMC
    url: 'https://e621.net/forum_topics/46279'
  version: 07704f4
servers:
  - url: 'https://e621.net'
    description: E621 (production)
  - url: 'http://localhost:3000'
    description: E621 (Development)
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  parameters:
    id:
      name: 'search[id]'
      in: query
      description: Search for a specific id.
      schema:
        type: integer
    idOrName:
      name: idOrName
      in: path
      required: true
      schema:
        type: string
      description: An ID that can be either an integer or a name.
    limit:
      name: limit
      in: query
      description: The maximum number of results to return. Between 0 and 320.
      schema:
        type: integer
        minimum: 0
        maximum: 500
    page:
      name: page
      in: query
      description: The page number of results to get. Between 1 and 750.
      schema:
        type: integer
        minimum: 1
        maximum: 750
    ip_addr:
      name: 'search[ip_addr]'
      in: query
      description: 'Must be Admin+ to use. See [postgres'' documentation](https://www.postgresql.org/docs/9.3/functions-net.html) for information on how this is parsed. Specifically, "is contained within or equals" (`<<=`).'
      schema:
        type: string
  schemas:
    AccessDeniedResponse:
      type: object
      required:
        - success
        - reason
      properties:
        success:
          type: boolean
        reason:
          type: string
          enum:
            - Access Denied
    NotFoundResponse:
      type: object
      required:
        - success
        - reason
      properties:
        success:
          type: boolean
        reason:
          type: string
          enum:
            - not found
    WarningRecordType:
      type: object
      required:
        - record_type
      properties:
        record_type:
          type: string
          enum:
            - unmark
            - ban
            - record
            - warning
    ModActionActions:
      type: string
