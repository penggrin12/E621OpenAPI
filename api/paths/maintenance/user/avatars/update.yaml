summary: Update Avatar Crop
operationId: updateAvatarCrop
tags:
  - Users
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - avatar_crop_x
          - avatar_crop_y
          - avatar_crop_w
        properties:
          avatar_crop_x:
            type: integer
            description: The x coordinate of the top left corner of the crop area.
          avatar_crop_y:
            type: integer
            description: The y coordinate of the top left corner of the crop area.
          avatar_crop_w:
            type: integer
            description: The width of the crop area. The height is always the same as the width.
responses:
  302:
    description: |
      Redirect
      Success should be determined based on the html, any errors will be present in an alert.
  403:
    $ref: "../../../../components/responses/accessDenied.yaml"
