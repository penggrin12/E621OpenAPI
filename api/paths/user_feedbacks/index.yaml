summary: Search User Feedbacks
operationId: searchUserFeedbacks
tags:
  - User Feedbacks
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - $ref: "../../components/parameters/query/order.yaml"
  - in: query
    name: search[deleted]
    description: You must be Janitor+.
    schema:
      type: string
      enum:
        - included
        - excluded
        - only
  - in: query
    name: search[body_matches]
    schema:
      type: string
  - in: query
    name: search[user_id]
    schema:
      type: integer
  - in: query
    name: search[user_name]
    schema:
      type: string
  - in: query
    name: search[creator_id]
    schema:
      type: integer
  - in: query
    name: search[creator_name]
    schema:
      type: string
  - in: query
    name: search[category]
    schema:
      $ref: "../../components/schemas/feedbackCategories.yaml"
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/userFeedback.yaml"
