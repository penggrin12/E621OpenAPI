summary: Search Tickets
operationId: searchTickets
tags:
  - Tickets
description: You must be Janitor+ to see tickets you did not create.
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - in: query
    name: search[creator_name]
    description: You must be Janitor+.
    schema:
      type: string
  - in: query
    name: search[creator_id]
    description: You must be Janitor+ unless providing your own id.
    schema:
      type: integer
  - in: query
    name: search[claimant_name]
    description: You must be Janitor+.
    schema:
      type: string
  - in: query
    name: search[claimant_id]
    description: You must be Janitor+.
    schema:
      type: integer
  - in: query
    name: search[accused_name]
    description: You must be Janitor+.
    schema:
      type: string
  - in: query
    name: search[accused_id]
    description: You must be Janitor+.
    schema:
      type: integer
  - in: query
    name: search[disp_id]
    description: You must be Janitor+.
    schema:
      type: integer
  - in: query
    name: search[qtype]
    schema:
      $ref: "../../components/schemas/ticketTypes.yaml"
  - in: query
    name: search[reason]
    description: You must be Janitor+.
    schema:
      type: string
  - in: query
    name: search[status]
    schema:
      type: string
      enum:
        - pending
        - partial
        - approved
        - pending_claimed
        - pending_unclaimed
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/ticket.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
