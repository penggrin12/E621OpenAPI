summary: Search Blips
operationId: searchBlips
tags:
  - Blips
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - $ref: "../../components/parameters/query/ipAddr.yaml"
  - name: search[order]
    in: query
    schema:
      type: string
      enum:
        - id_asc
        - id_desc
        - updated_at
        - updated_at_desc
  - name: search[creator_id]
    in: query
    schema:
      type: integer
  - name: search[creator_name]
    in: query
    schema:
      type: string
  - name: search[body_matches]
    in: query
    schema:
      type: string
  - name: search[response_to]
    in: query
    schema:
      type: integer
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/blip.yaml"
