summary: Create Artist
operationId: createArtist
tags:
  - Artists
security:
  - basicAuth: []
description: |
  `other_names` & `urls` are silently truncated to 25 entries.
  `notes` is silently truncated to the wiki page limit (250,000).
  Individual `other_names` are silently truncated to 100 characters.
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - name
        properties:
          name:
            type: string
          other_names:
            type: array
            items:
              type: string
          other_names_string:
            type: string
          url_string:
            type: string
          notes:
            type: string
          group_name:
            type: string
          linked_user_id:
            type: integer
            nullable: true
            description: Only usable for Janitor+
          is_locked:
            type: boolean
            description: Only usable for Janitor+
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/artist.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
