summary: Search Post Events
operationId: searchPostEvents
tags:
  - Post Events
security:
  - basicAuth: []
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - $ref: "../../components/parameters/query/order.yaml"
  - $ref: "../../components/parameters/query/v2.yaml"
  - in: query
    name: search[post_id]
    schema:
      type: integer
  - in: query
    name: search[creator_id]
    schema:
      type: integer
  - in: query
    name: search[creator_name]
    schema:
      type: string
  - in: query
    name: search[action]
    schema:
      $ref: "../../components/schemas/postEventActions.yaml"
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          oneOf:
            - type: object
              description: The legacy format, returned by default. This format is deprecated.
              required:
                - post_events
              properties:
                post_events:
                  type: array
                  items:
                    $ref: "../../components/schemas/postEvent.yaml"
            - type: array
              description: The new format, returned with `v2=true`.
              items:
                $ref: "../../components/schemas/postEvent.yaml"
