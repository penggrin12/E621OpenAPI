summary: Query IQDB
operationId: queryIqdbPost
tags:
  - IQDB
parameters:
  - $ref: "../../../components/parameters/query/v2.yaml"
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          search[file]:
            type: string
            format: binary
          search[score_cutoff]:
            type: integer
          search[url]:
            type: string
          search[post_id]:
            type: string
          search[hash]:
            type: string
    application/json:
      schema:
        type: object
        properties:
          score_cutoff:
            type: number
          url:
            type: string
          post_id:
            type: string
          hash:
            type: string
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          oneOf:
            - type: array
              description: The legacy format, returned by default. This format is deprecated.
              items:
                $ref: "../../../components/schemas/iqdbResponse.yaml"
            - type: array
              description: The new format, returned with `v2=true`.
              items:
                $ref: "../../../components/schemas/iqdbResponseV2.yaml"
  403:
    $ref: "../../../components/responses/accessDenied.yaml"
