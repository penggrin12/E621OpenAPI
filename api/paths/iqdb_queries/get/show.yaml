summary: Query IQDB
operationId: queryIqdbGet
tags:
  - IQDB
parameters:
  - $ref: "../../../components/parameters/query/v2.yaml"
  - name: search[score_cutoff]
    in: query
    schema:
      type: integer
  - name: search[url]
    in: query
    schema:
      type: string
  - name: search[post_id]
    in: query
    schema:
      type: integer
  - name: search[hash]
    in: query
    schema:
      type: string
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          oneOf:
            - type: array
              description: The legacy format, returned by default. This format is deprecated.
              items:
                $ref: "../../../components/schemas/iqdbResponse.yaml"
            - type: array
              description: The new format, returned with `v2=true`.
              items:
                $ref: "../../../components/schemas/iqdbResponseV2.yaml"
  403:
    $ref: "../../../components/responses/accessDenied.yaml"
