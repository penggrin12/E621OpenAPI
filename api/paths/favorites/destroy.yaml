summary: Remove Favorite
operationId: removeFavorite
tags:
  - Favorites
security:
  - basicAuth: []
parameters:
  - name: id
    in: path
    required: true
    schema:
      type: integer
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: object
          required:
            - post_id
            - favorite_count
          properties:
            post_id:
              type: number
            favorite_count:
              type: number
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
