summary: Add Favorite
operationId: addFavorite
tags:
  - Favorites
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - post_id
        properties:
          post_id:
            type: integer
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          type: object
          required:
            - post_id
            - favorite_count
          properties:
            post_id:
              type: number
            favorite_count:
              type: number
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
