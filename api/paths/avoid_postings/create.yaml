summary: Create Avoid Posting Entry
operationId: createAvoidPosting
tags:
  - Avoid Posting Entries
security:
  - basicAuth: []
description: Must have the bd staff user flag.
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - artist_attributes
        properties:
          details:
            type: string
          staff_notes:
            type: string
          is_active:
            type: boolean
          artist_attributes:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                description: If provided and the artist does not exist, an artist will be created.
              other_names_string:
                type: string
              other_names:
                type: array
                items:
                  type: string
              group_name:
                type: string
              linked_user_id:
                type: integer
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/avoidPosting.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
