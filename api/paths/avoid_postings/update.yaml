summary: Edit Avoid Posting Entry
operationId: editAvoidPosting
tags:
  - Avoid Posting Entries
security:
  - basicAuth: []
description: Must have the bd staff user flag.
parameters:
  - $ref: "../../components/parameters/path/idOrName.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          details:
            type: string
          staff_notes:
            type: string
          is_active:
            type: boolean
          artist_attributes:
            type: object
            properties:
              name:
                type: string
                description: If provided and the artist does not exist, an artist will be created.
              other_names_string:
                type: string
              other_names:
                type: array
                items:
                  type: string
              group_name:
                type: string
              linked_user_id:
                type: integer
responses:
  204:
    description: Success
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
