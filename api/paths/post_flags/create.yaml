summary: Create Post Flag
operationId: createPostFlag
tags:
  - Post Flags
security:
  - basicAuth: []
description: Will error if post_id is not provided.
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - post_id
          - reason_name
        properties:
          post_id:
            type: integer
          reason_name:
            type: string
            enum:
              - uploading_guidelines
              - young_human
              - dnp_artist
              - pay_content
              - trace
              - previously_deleted
              - real_porn
              - corrupt
              - inferior
          parent_id:
            type: integer
          note:
            type: string
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/postFlag.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
