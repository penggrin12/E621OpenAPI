summary: Search Post Flags
operationId: searchPostFlags
tags:
  - Post Flags
parameters:
  - $ref: "../../components/parameters/limit.yaml"
  - $ref: "../../components/parameters/page.yaml"
  - $ref: "../../components/parameters/id.yaml"
  - $ref: "../../components/parameters/ipAddr.yaml"
  - name: search[order]
    in: query
    schema:
      type: string
      enum:
        - id_asc
        - id_desc
  - in: query
    name: search[reason_matches]
    schema:
      type: string
  - in: query
    name: search[creator_id]
    schema:
      type: integer
  - in: query
    name: search[creator_name]
    schema:
      type: string
  - in: query
    name: search[post_id]
    schema:
      type: integer
  - in: query
    name: search[post_tags_match]
    schema:
      type: string
  - in: query
    name: search[type]
    schema:
      type: string
  - in: query
    name: search[is_resolved]
    schema:
      type: boolean
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/postFlag.yaml"
