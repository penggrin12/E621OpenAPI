summary: Search Upload Whitelists
operationId: searchUploadWhitelists
tags:
  - Upload Whitelists
parameters:
  - $ref: "../../components/parameters/limit.yaml"
  - $ref: "../../components/parameters/page.yaml"
  - $ref: "../../components/parameters/id.yaml"
  - name: search[order]
    in: query
    schema:
      type: string
      enum:
        - id_asc
        - id_desc
        - domain
        - path
        - updated_at
        - created_at
  - in: query
    name: search[domain]
    schema:
      type: string
  - in: query
    name: search[path]
    schema:
      type: string
  - in: query
    name: search[note]
    schema:
      type: string
  - in: query
    name: search[reason]
    schema:
      type: string
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/uploadWhitelist.yaml"
