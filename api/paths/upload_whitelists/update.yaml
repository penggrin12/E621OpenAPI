summary: Edit Upload Whitelist
operationId: editUploadWhitelist
tags:
  - Upload Whitelists
security:
  - basicAuth: []
parameters:
  - $ref: "../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/x-www-form-urlencoded:
      schema:
        type: object
        properties:
          upload_whitelist[allowed]:
            type: string
          upload_whitelist[pattern]:
            type: string
          upload_whitelist[reason]:
            type: string
          upload_whitelist[note]:
            type: string
          upload_whitelist[hidden]:
            type: boolean
responses:
  204:
    description: Success
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
