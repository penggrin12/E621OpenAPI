summary: Create Upload Whitelist
operationId: createUploadWhitelist
tags:
  - Upload Whitelists
security:
  - basicAuth: []
description: You must be Admin+.
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - allowed
          - domain
          - path
        properties:
          allowed:
            type: string
          domain:
            type: string
          path:
            type: string
          reason:
            type: string
          note:
            type: string
          hidden:
            type: boolean
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/uploadWhitelist.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
