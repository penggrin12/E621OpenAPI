summary: Create Tag Alias
operationId: createTagAlias
tags:
  - Tag Aliases
security:
  - basicAuth: []
description: Errors will result in a 406 with no information.
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - antecedent_name
          - consequent_name
          - reason
        properties:
          antecedent_name:
            type: string
          consequent_name:
            type: string
          reason:
            type: string
          skip_forum:
            type: boolean
            description: Must be Admin+.
responses:
  302:
    description: Success
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  406:
    description: Failure
