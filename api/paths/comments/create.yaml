summary: Create Comment
operationId: createComment
tags:
  - Comments
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - body
          - post_id
        properties:
          body:
            type: string
          post_id:
            type: integer
          do_not_bump_post:
            type: boolean
          is_sticky:
            type: boolean
            description: Only usable for Janitor+
          is_hidden:
            type: boolean
            description: Only usable for Moderator+
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/comment.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
