summary: Mark Post As Translated
operationId: markPostAsTranslated
tags:
  - Posts
security:
  - basicAuth: []
description: Will error if no body is provided.
parameters:
  - $ref: "../../components/parameters/path/id.yaml"
  - $ref: "../../components/parameters/query/v2.yaml"
  - $ref: "../../components/parameters/query/mode.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          translation_check:
            type: boolean
          partially_translated:
            type: boolean
responses:
  200:
    $ref: "../../components/responses/post.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
