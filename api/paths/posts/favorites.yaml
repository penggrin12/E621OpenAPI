summary: List Post Favorites
operationId: listPostFavorites
tags:
  - Posts
parameters:
  - $ref: "../../components/parameters/path/id.yaml"
  - name: limit
    in: query
    description: The maximum number of results to return. Between 1 and 100.
    schema:
      type: integer
      minimum: 1
      maximum: 100
  - $ref: "../../components/parameters/query/page.yaml"
description: You must be the user or Moderator+ to see users that have their favorites hidden.
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/minimalUser.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
