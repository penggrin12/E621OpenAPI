summary: Unflag Post
operationId: unflagPost
tags:
  - Posts
description: You must have the "Approve Posts" permission.
security:
  - basicAuth: []
parameters:
  - $ref: "../../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          approval:
            type: string
            description: Approves the post if set to "approve".

responses:
  204:
    description: Success
  403:
    $ref: "../../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../../components/responses/notFound.yaml"
