summary: Search Posts
operationId: searchPosts
tags:
  - Posts
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/v2.yaml"
  - $ref: "../../components/parameters/query/mode.yaml"
  - in: query
    name: tags
    schema:
      type: string
  - in: query
    name: md5
    schema:
      type: string
  - in: query
    name: random
    schema:
      type: string
responses:
  200:
    description: |
      Success
      if `v2=true`, open the schema and find the schema for the mode being used.
    content:
      application/json:
        schema:
          oneOf:
            - type: object
              description: The legacy format, returned by default. This format is deprecated.
              required:
                - posts
              properties:
                posts:
                  type: array
                  items:
                    $ref: "../../components/schemas/legacyPost.yaml"
            - type: array
              description: The basic format, returned with `v2=true` and mode is not set.
              items:
                $ref: "../../components/schemas/basicPost.yaml"
            - type: array
              description: The extended format, returned with `v2=true` and `mode=extended`.
              items:
                $ref: "../../components/schemas/extendedPost.yaml"
            - type: array
              description: The thumbnail format, returned with `v2=true` and `mode=thumbnail`.
              items:
                $ref: "../../components/schemas/thumbnailPost.yaml"
            - type: object
              description: |
                When searching by md5.
                The legacy format, returned by default. This format is deprecated.
              required:
                - post
              properties:
                post:
                  $ref: "../../components/schemas/legacyPost.yaml"
            - allOf:
                - $ref: "../../components/schemas/basicPost.yaml"
                - description: |
                    When searching by md5.
                    The basic format, returned with `v2=true` and mode is not set.
            - allOf:
                - $ref: "../../components/schemas/extendedPost.yaml"
                - description: |
                    When searching by md5.
                    The extended format, returned with `v2=true` and `mode=extended`.
            - allOf:
                - $ref: "../../components/schemas/thumbnailPost.yaml"
                - description: |
                    When searching by md5.
                    The thumbnail format, returned with `v2=true` and `mode=thumbnail`.
