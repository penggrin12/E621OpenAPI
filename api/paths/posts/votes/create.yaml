summary: Create Post Vote
operationId: createPostVote
tags:
  - Post Votes
security:
  - basicAuth: []
parameters:
  - $ref: "../../../components/parameters/path/id.yaml"
  - name: score
    in: query
    required: true
    schema:
      $ref: "../../../components/schemas/upDownVote.yaml"
  - name: no_unvote
    in: query
    schema:
      type: boolean
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: object
          required:
            - score
            - up
            - down
            - our_score
          properties:
            score:
              type: integer
            up:
              type: integer
            down:
              type: integer
            our_score:
              type: integer
  403:
    $ref: "../../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../../components/responses/notFound.yaml"
  422:
    $ref: "../../../components/responses/expectedError.yaml"
