summary: Search Post Sets
operationId: searchPostSets
tags:
  - Post Sets
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - name: search[order]
    in: query
    schema:
      type: string
      enum:
        - id_asc
        - id_desc
        - name
        - shortname
        - post_count
        - postcount
        - created_at
        - updated_at
        - update
  - in: query
    name: search[creator_id]
    schema:
      type: integer
  - in: query
    name: search[creator_name]
    schema:
      type: string
  - in: query
    name: search[name]
    schema:
      type: string
  - in: query
    name: search[shortname]
    schema:
      type: string
  - in: query
    name: search[is_public]
    description: You must be Moderator+.
    schema:
      type: boolean
  - in: query
    name: search[post_id]
    schema:
      type: integer
  - in: query
    name: search[maintainer_id]
    schema:
      type: integer
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/postSet.yaml"
