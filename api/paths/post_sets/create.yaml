summary: Create Post Set
operationId: createPostSet
tags:
  - Post Sets
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - name
          - shortname
        properties:
          name:
            type: string
          shortname:
            type: string
          description:
            type: string
          is_public:
            type: boolean
          ransfer_on_delete:
            type: boolean
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/postSet.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
