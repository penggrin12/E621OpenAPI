summary: List Post Sets For Select
operationId: listPostSetsForSelect
tags:
  - Post Sets
security:
  - basicAuth: []
description: You must be the owner of the set, a maintainer (if public), or Admin+.
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: object
          properties:
            Owned:
              type: array
              items:
                oneOf:
                  - type: string
                  - type: integer
                example:
                  - ["my_set", 1]
            Maintained:
              type: array
              items:
                oneOf:
                  - type: string
                  - type: integer
                example:
                  - ["my_set", 1]
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
