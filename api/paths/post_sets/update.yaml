summary: Edit Post Set
operationId: editPostSet
tags:
  - Post Sets
security:
  - basicAuth: []
description: You must be the owner of the set, or Admin+.
parameters:
  - $ref: "../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          name:
            type: string
          shortname:
            type: string
          description:
            type: string
          is_public:
            type: boolean
          transfer_on_delete:
            type: boolean
responses:
  204:
    description: Success
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
