summary: Search Artist Versions
operationId: searchArtistVersions
tags:
  - Artist Versions
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - $ref: "../../components/parameters/query/ipAddr.yaml"
  - name: search[order]
    in: query
    description: The order of the results.
    schema:
      type: string
      enum:
        - id_asc
        - id_desc
        - name
  - name: search[name]
    in: query
    description: The name of the artist.
    schema:
      type: string
  - name: search[artist_id]
    in: query
    description: The id of the artist.
    schema:
      type: string
  - name: search[updater_name]
    in: query
    description: The name of the user that updated the artist.
    schema:
      type: string
  - name: search[updater_id]
    in: query
    description: The id of the user that updated the artist.
    schema:
      type: string
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/artistVersion.yaml"
