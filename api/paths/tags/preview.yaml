summary: Preview Tags
operationId: previewTags
tags:
  - Tags
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - tags
        properties:
          tags:
            type: string
            description: The tags to preview, space separated.
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/tagPreview.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
