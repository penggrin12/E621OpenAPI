summary: Search Post Approvals
operationId: searchPostApprovals
tags:
  - Post Approvals
parameters:
  - $ref: "../../components/parameters/limit.yaml"
  - $ref: "../../components/parameters/page.yaml"
  - $ref: "../../components/parameters/id.yaml"
  - name: search[order]
    in: query
    schema:
      type: string
      enum:
        - id_asc
        - id_desc
  - name: search[post_tags_match]
    in: query
    schema:
      type: string
  - name: search[user_id]
    in: query
    schema:
      type: integer
  - name: search[user_name]
    in: query
    schema:
      type: string
  - name: search[post_id]
    in: query
    schema:
      type: integer
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/postApproval.yaml"
