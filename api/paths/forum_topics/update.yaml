summary: Edit Forum Topic
operationId: editForumTopic
tags:
  - Forum Topics
security:
  - basicAuth: []
parameters:
  - $ref: "../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          title:
            type: string
          category_id:
            type: integer
          original_post_attributes][id:
            type: integer
            description: Forum post ID. Silently ignored
          original_post_attributes][body:
            type: string
            description: First forum post body.
          is_sticky:
            type: boolean
            description: You must be Moderator+.
          is_locked:
            type: boolean
            description: You must be Moderator+.
responses:
  204:
    description: Success
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
