summary: Add Post To Pool
operationId: addPostToPool
tags:
  - Pools
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - post_id
        properties:
          pool_id:
            type: integer
            description: Mutually exclusive with pool_name.
          pool_name:
            type: string
            description: Mutually exclusive with pool_id.
          post_id:
            type: integer
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/pool.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
