summary: Get Recent Pools
operationId: getRecentPools
tags:
  - Pools
security:
  - basicAuth: []
requestBody:
  content:
    application/x-www-form-urlencoded:
      schema:
        type: object
        required:
          - post_id
        properties:
          pool_id:
            type: integer
            description: Mutually exclusive with pool_name.
          pool_name:
            type: string
            description: Mutually exclusive with pool_id. The value is not normalized.
          post_id:
            type: integer
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: string
              name:
                type: string
