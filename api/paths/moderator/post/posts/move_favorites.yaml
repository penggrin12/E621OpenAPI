summary: Move Post Favorites
operationId: movePostFavorites
tags:
  - Posts
security:
  - basicAuth: []
description: You must have the "Approve Posts" permission. `commit=Submit`` must be set.
parameters:
  - $ref: "../../../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/x-www-form-urlencoded:
      schema:
        type: object
        required:
          - commit
        properties:
          commit:
            type: string
            description: If not set, nothing will happen.
            enum:
              - Submit
responses:
  302:
    description: Success
  403:
    $ref: "../../../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../../../components/responses/notFound.yaml"
