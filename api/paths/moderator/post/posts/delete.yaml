summary: Delete Post
operationId: deletePost
tags:
  - Posts
security:
  - basicAuth: []
description: You must have the "Approve Posts" permission. `commit=Delete` must be set.
parameters:
  - $ref: "../../../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          reason:
            type: string
            description: If the post does not have an active flag, this is required.
          move_favorites:
            type: boolean
            description: Move favorites to parent.
          copy_sources:
            type: boolean
            description: Copy sources to parent.
          copy_tags:
            type: boolean
            description: Copy tags to parent.
          dmail:
            type: string
            description: |
              The content of the dmail to send to the uploader.
              Placeholders:
              - %REASON%
              - %POST_ID%
              - %STAFF_NAME%
              - %STAFF_ID%
              - %UPLOADER_ID%
              - %FLAG_ID%
          dmail_title:
            type: string
            description: |
              The title of the dmail to send to the uploader.
                Placeholders:
                - %REASON%
                - %POST_ID%
                - %STAFF_NAME%
                - %STAFF_ID%
                - %UPLOADER_ID%
                - %FLAG_ID%
          commit:
            type: string
            description: If not set, nothing will happen.
            enum:
              - Delete

responses:
  302:
    description: Success
  403:
    $ref: "../../../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../../../components/responses/notFound.yaml"
  422:
    $ref: "../../../../components/responses/expectedError.yaml"
