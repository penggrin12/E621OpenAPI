summary: Approve Post
operationId: approvePost
tags:
  - Posts
  - Post Approvals
security:
  - basicAuth: []
description: You must have the "Approve Posts" permission.
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - post_id
        properties:
          post_id:
            type: integer
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          type: object
          minProperties: 0
          maxProperties: 0
          additionalProperties: false
  204:
    description: Failure
  403:
    $ref: "../../../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../../../components/responses/notFound.yaml"
