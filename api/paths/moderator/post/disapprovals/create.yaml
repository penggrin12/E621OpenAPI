summary: Create Post Disapproval
operationId: createPostDisapproval
tags:
  - Post Disapprovals
security:
  - basicAuth: []
description: You must have the "Approve Posts" permission.
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - post_id
          - reason
        properties:
          post_id:
            type: integer
          reason:
            type: string
            enum:
              - borderline_quality
              - borderline_relevancy
              - other
          message:
            type: string
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../../../components/schemas/postDisapproval.yaml"
  403:
    $ref: "../../../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../../../components/responses/expectedError.yaml"
