summary: Edit Pool
operationId: editPool
tags:
  - Pools
security:
  - basicAuth: []
parameters:
  - $ref: "../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
          is_active:
            type: boolean
          category:
            $ref: "../../components/schemas/poolCategories.yaml"
          post_ids_string:
            type: string
            description: Space separated list of post IDs. Mutually exclusive with post_ids.
          post_ids:
            type: array
            description: Array of post IDs. Mutually exclusive with post_ids_string.
            items:
              type: integer
responses:
  204:
    description: Success
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
