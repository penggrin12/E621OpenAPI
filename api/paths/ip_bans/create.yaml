summary: Create IP Ban
operationId: createIpBan
tags:
  - IP Bans
security:
  - basicAuth: []
description: You must be Admin+.
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - ip_addr
          - reason
        properties:
          ip_addr:
            type: string
          reason:
            type: string
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/ipBan.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
