summary: List IP Bans
operationId: listIPBans
tags:
  - IP Bans
security:
  - basicAuth: []
parameters:
  - $ref: "../../components/parameters/limit.yaml"
  - $ref: "../../components/parameters/page.yaml"
  - $ref: "../../components/parameters/id.yaml"
  - $ref: "../../components/parameters/ipAddr.yaml"
  - name: search[order]
    in: query
    schema:
      type: string
      enum:
        - id_asc
        - id_desc
  - in: query
    name: search[banner_id]
    schema:
      type: integer
  - in: query
    name: search[banner_name]
    schema:
      type: string
  - in: query
    name: search[reason]
    schema:
      type: string
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/ipBan.yaml"
