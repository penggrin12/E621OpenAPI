summary: Get Help Page
operationId: getHelpPage
tags:
  - Help Pages
parameters:
  - name: id
    in: path
    required: true
    schema:
      oneOf:
        - type: integer
        - type: string
    description: An ID that can be either an integer or a name.
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/help.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
