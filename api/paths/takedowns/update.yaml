summary: Edit Takedown
operationId: editTakedown
tags:
  - Takedowns
security:
  - basicAuth: []
description: You must have the bd staff user flag.
parameters:
  - $ref: "../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          notes:
            type: string
          reason_hidden:
            type: boolean
          takedown_posts:
            type: string
          process_takedown:
            type: boolean
            description: If not truthy, the takedown will be denied.
          delete_reason:
            type: string
responses:
  204:
    description: Success
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
