summary: Create Takedown
operationId: createTakedown
tags:
  - Takedowns
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - email
          - reason
        properties:
          email:
            type: string
          source:
            type: string
          instructions:
            type: string
          reason:
            type: string
          post_ids:
            type: array
            description: post_ids][]=1&takedown[post_ids][=2
            items:
              type: integer
          reason_hidden:
            type: boolean
          notes:
            type: string
            description: Must have the bd staff user flag to use.
          del_post_ids:
            type: array
            description: |
              Must have the bd staff user flag to use.
              del_post_ids][]=1&takedown[del_post_ids][=2
            items:
              type: integer
          status:
            type: string
            description: Must have the bd staff user flag to use.
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/takedown.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
