summary: Search Edit Histories
operationId: searchEditHistories
tags:
  - Edit Histories
security:
  - basicAuth: []
description: You must be Moderator+.
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - $ref: "../../components/parameters/query/ipAddr.yaml"
  - $ref: "../../components/parameters/query/order.yaml"
  - in: query
    name: search[body_matches]
    schema:
      type: string
  - in: query
    name: search[subject_matches]
    schema:
      type: string
  - in: query
    name: search[versionable_type]
    schema:
      type: string
      enum:
        - Blip
        - Comment
        - ForumPost
  - in: query
    name: search[versionable_id]
    schema:
      type: integer
  - in: query
    name: search[editor_id]
    schema:
      type: integer
  - in: query
    name: search[editor_name]
    schema:
      type: string
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/editHistory.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
