summary: Create Bulk Update Request
operationId: createBulkUpdateRequest
tags:
  - Bulk Update Requests
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - script
          - title
          - reason
        properties:
          script:
            type: string
          title:
            type: string
          reason:
            type: string
          forum_topic_id:
            type: integer
            description: You must be able to reply to the topic.
          skip_forum:
            type: boolean
            description: Only usable for Admin+
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/bulkUpdateRequest.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
