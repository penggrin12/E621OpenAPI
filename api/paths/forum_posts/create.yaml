summary: Create Forum Post
operationId: createForumPost
tags:
  - Forum Posts
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - body
          - topic_id
        properties:
          body:
            type: string
          topic_id:
            type: integer
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/forumPost.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
