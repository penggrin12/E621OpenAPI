summary: Create Forum Post Vote
operationId: createForumPostVote
tags:
  - Forum Post Votes
security:
  - basicAuth: []
parameters:
  - $ref: "../../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - score
        properties:
          score:
            $ref: "../../../components/schemas/upDownMehVote.yaml"
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/forumPostVote.yaml"
  403:
    $ref: "../../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../../components/responses/notFound.yaml"
  422:
    $ref: "../../../components/responses/expectedError.yaml"
