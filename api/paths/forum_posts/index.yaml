summary: Search Forum Posts
operationId: searchForumPosts
tags:
  - Forum Posts
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - $ref: "../../components/parameters/query/order.yaml"
  - in: query
    name: search[creator_id]
    schema:
      type: integer
  - in: query
    name: search[creator_name]
    schema:
      type: string
  - in: query
    name: search[topic_id]
    schema:
      type: integer
  - in: query
    name: search[topic_title_matches]
    schema:
      type: string
  - in: query
    name: search[body_matches]
    schema:
      type: string
  - in: query
    name: search[topic_category_id]
    schema:
      type: integer
  - in: query
    name: search[is_hidden]
    schema:
      type: boolean
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/forumPost.yaml"
