summary: List Most Upvoted Posts
operationId: listPopular
tags:
  - Popular
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/v2.yaml"
  - $ref: "../../components/parameters/query/mode.yaml"
  - name: date
    in: query
    description: The date to list popular uploads for. Only The day, month, and year are considered.
    schema:
      type: string
      format: date
  - name: scale
    in: query
    description: The scale of the results, in relation to `date`.
    schema:
      type: string
      enum:
        - month
        - week
        - day
responses:
  200:
    $ref: "../../components/responses/posts.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
