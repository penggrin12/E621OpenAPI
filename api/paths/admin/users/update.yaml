summary: Admin Edit User
operationId: adminEditUser
tags:
  - Admin Users
security:
  - basicAuth: []
description: You must be Admin+. If editing an Admin+, you must be Owner+.
parameters:
  - $ref: "../../../components/parameters/path/id.yaml"
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          verified:
            type: boolean
            description: Must have the bd staff user flag to use.
          level:
            type: integer
            description: Must have the bd staff user flag to promote to Admin+.
          name:
            type: string
          profile_about:
            type: string
          profile_artinfo:
            type: string
          base_upload_limit:
            type: integer
          enable_privacy_mode:
            type: boolean
          email:
            type: string
            description: Must have the bd staff user flag to use.
          can_approve_posts:
            type: boolean
          can_upload_free:
            type: boolean
          no_flagging:
            type: boolean
          replacements_beta:
            type: boolean
          custom_title:
            type: string
responses:
  200:
    description: Success
  400:
    $ref: "../../../components/responses/messageError.yaml"
  403:
    $ref: "../../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../../components/responses/notFound.yaml"
  422:
    $ref: "../../../components/responses/expectedError.yaml"
