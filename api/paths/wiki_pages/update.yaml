summary: Edit Wiki Page
operationId: editWikiPage
tags:
  - Wiki Pages
security:
  - basicAuth: []
description: You must be Janitor+ if the wiki page is locked.
parameters:
  - $ref: "../../components/parameters/path/id.yaml"
    required: true
    description: The ID of the wiki page.
    schema:
      type: integer
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          body:
            type: string
          edit_reason:
            type: string
          parent:
            type: string
            description: Must be Privileged+ to use.
          title:
            type: string
            description: Must be Janitor+ to use.
          is_locked:
            type: boolean
            description: Must be Janitor+ to use.
          is_deleted:
            type: boolean
            description: Must be Janitor+ to use.
          skip_secondary_validations:
            type: boolean
            description: Must be Janitor+ to use.
          category_id:
            $ref: "../../components/schemas/tagCategories.yaml"
          category_is_locked:
            type: boolean
            description: Must be Admin+ to use.
responses:
  204:
    description: Success
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  404:
    $ref: "../../components/responses/notFound.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
