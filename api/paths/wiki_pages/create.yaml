summary: Create Wiki Page
operationId: createWikiPage
tags:
  - Wiki Pages
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - title
          - body
        properties:
          title:
            type: string
          body:
            type: string
          edit_reason:
            type: string
          parent:
            type: string
            description: Must be Privileged+ to use.
          is_locked:
            type: boolean
            description: Must be Janitor+ to use.
          is_deleted:
            type: boolean
            description: Must be Janitor+ to use.
          skip_secondary_validations:
            type: boolean
            description: Must be Janitor+ to use.
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/wikiPage.yaml"
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
