summary: Create Note
operationId: createNote
tags:
  - Notes
security:
  - basicAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - post_id
          - x
          - y
          - width
          - height
          - body
        properties:
          post_id:
            type: integer
          x:
            type: integer
          y:
            type: integer
          width:
            type: integer
          height:
            type: integer
          body:
            type: string
          html_id:
            type: string
            description: Passthrough, used in frontend.
responses:
  201:
    description: Success
    content:
      application/json:
        schema:
          allOf:
            - $ref: "../../components/schemas/note.yaml"
            - type: object
              required:
                - html_id
              properties:
                html_id:
                  type: string
                  description: Passthrough, used in frontend.
  403:
    $ref: "../../components/responses/accessDenied.yaml"
  422:
    $ref: "../../components/responses/expectedError.yaml"
