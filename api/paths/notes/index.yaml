summary: Search Notes
operationId: searchNotes
tags:
  - Notes
parameters:
  - $ref: "../../components/parameters/query/limit.yaml"
  - $ref: "../../components/parameters/query/page.yaml"
  - $ref: "../../components/parameters/query/id.yaml"
  - $ref: "../../components/parameters/query/order.yaml"
  - in: query
    name: search[body_matches]
    schema:
      type: string
  - in: query
    name: search[is_active]
    schema:
      type: boolean
  - in: query
    name: search[post_id]
    schema:
      type: integer
  - in: query
    name: search[post_tags_match]
    schema:
      type: string
  - in: query
    name: search[post_note_updater_id]
    schema:
      type: integer
  - in: query
    name: search[post_note_updater_name]
    schema:
      type: string
  - in: query
    name: search[creator_id]
    schema:
      type: integer
  - in: query
    name: search[creator_name]
    schema:
      type: string
responses:
  200:
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../../components/schemas/note.yaml"
