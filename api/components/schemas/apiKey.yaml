type: object
required:
  - id
  - created_at
  - updated_at
  - user_id
  - key
  - name
  - last_used_at
  - last_used_ip_address
  - last_user_agent
  - expires_at
  - notified_at
properties:
  id:
    type: integer
  updated_at:
    type: string
    format: date-time
  created_at:
    type: string
    format: date-time
  user_id:
    type: integer
  key:
    type: string
  name:
    type: string
  last_used_at:
    type: string
    format: date-time
    nullable: true
  last_used_ip_address:
    oneOf:
      - type: string
        format: ipv4
        nullable: true
      - type: string
        format: ipv6
        nullable: true
  last_user_agent:
    type: string
    nullable: true
  expires_at:
    type: string
    format: date-time
    nullable: true
  notified_at:
    type: string
    format: date-time
    nullable: true
