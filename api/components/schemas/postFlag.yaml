type: object
required:
  - id
  - created_at
  - post_id
  - reason
  - is_resolved
  - updated_at
  - is_deletion
  - type
properties:
  id:
    type: integer
  created_at:
    type: string
    format: date-time
  post_id:
    type: integer
  reason:
    type: string
  creator_id:
    type: integer
    description: Only visible to creator and Janitor+
    nullable: true
  is_resolved:
    type: boolean
  updated_at:
    type: string
    format: date-time
  is_deletion:
    type: boolean
  type:
    type: string
    enum:
      - flag
      - deletion
  note:
    type: string
    description: Only visible to creator and Janitor+
    nullable: true
