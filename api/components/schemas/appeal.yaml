type: object
required:
  - id
  - disp_id
  - qtype
  - status
  - handler_id
  - created_at
  - updated_at
properties:
  id:
    type: integer
  creator_id:
    type: integer
  disp_id:
    type: string
  qtype:
    $ref: "./appeal/qtype.yaml"
  status:
    $ref: "./appeal/status.yaml"
  reason:
    type: string
  response:
    type: string
  claimant_id:
    type: integer
    nullable: true
  handler_id:
    type: integer
    nullable: true
  accused_id:
    type: integer
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
