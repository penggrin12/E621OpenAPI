type: object
required:
  - id
  - created_at
  - updated_at
  - change_seq
  - files
  - uploader_id
  - uploader_name
  - approver_id
  - stats
  - flags
  - has
  - relationships
  - pools
  - rating
  - locked_tags
  - sources
  - description
  - tags
properties:
  id:
    type: integer
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  change_seq:
    type: integer
  files:
    $ref: "./post/files.yaml"
  uploader_id:
    type: integer
  uploader_name:
    type: string
  approver_id:
    type: integer
    nullable: true
  stats:
    $ref: "./post/stats.yaml"
  flags:
    $ref: "./post/flags.yaml"
  has:
    $ref: "./post/has.yaml"
  relationships:
    $ref: "./post/relationships.yaml"
  pools:
    type: array
    items:
      type: integer
  rating:
    $ref: "./ratings.yaml"
  locked_tags:
    type: array
    items:
      type: string
  sources:
    type: array
    items:
      type: string
  description:
    type: string
