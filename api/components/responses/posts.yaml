description: |
  Success
  if `v2=true`, open the schema and find the schema for the mode being used.
content:
  application/json:
    schema:
      oneOf:
        - type: object
          description: The legacy format, returned by default. This format is deprecated.
          required:
            - posts
          properties:
            posts:
              type: array
              items:
                $ref: "../../components/schemas/legacyPost.yaml"
        - type: array
          description: The basic format, returned with `v2=true` and mode is not set.
          items:
            $ref: "../../components/schemas/basicPost.yaml"
        - type: array
          description: The extended format, returned with `v2=true` and `mode=extended`.
          items:
            $ref: "../../components/schemas/extendedPost.yaml"
        - type: array
          description: The thumbnail format, returned with `v2=true` and `mode=thumbnail`.
          items:
            $ref: "../../components/schemas/thumbnailPost.yaml"
