  responses:
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundResponse'
    AccessDenied:
      description: Access Denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AccessDeniedResponse'
    ExpectedError:
      description: Invalid Input Data
      content:
        application/json:
          schema:
            type: object
            required:
              - errors
            example:
              - errors:
                  key:
                    - the error
            properties:
              errors:
                type: array
                items:
                  type: string
    MessageSuccess:
      description: Success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageSuccessResponse'
    MessageError:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageErrorResponse'
    UserResponse:
      description: Success
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/FullUser'
              - $ref: '#/components/schemas/FullCurrentUser'
  requestBodies:
    warning:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WarningRecordType'
paths:
  /api_keys.json:
    get:
      summary: Get API Keys
      operationId: getAPIKeys
      tags:
        - API Keys
      security:
        - browserAuth: []
      description: 'Requires [browser authentication](#operations-Sessions-login) (username & password), as well as hourly password confirmations (reauthentication).'
      parameters:
        - $ref: '#/components/parameters/limitQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/idQuery'
        - name: 'search[order]'
          in: query
          schema:
            type: string
            enum:
              - id
              - id_asc
              - id_desc
              - name
              - name_asc
              - name_desc
              - created_at
              - created_at_asc
              - created_at_desc
              - updated_at
              - updated_at_asc
              - updated_at_desc
              - expires_at
              - expires_at_asc
              - expires_at_desc
              - last_used_at
              - last_used_at_asc
              - last_used_at_desc
        - name: 'search[name_matches]'
          in: query
          schema:
            type: string
        - name: 'search[is_expired]'
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Create API Key
      operationId: createAPIKey
      tags:
        - API Keys
      security:
        - browserAuth: []
          csrfToken: []
      description: 'Requires [browser authentication](#operations-Sessions-login) (username & password), as well as hourly password confirmations (reauthentication).'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - authenticity_token
                - 'api_key[name]'
              properties:
                authenticity_token:
                  type: string
                  description: CSRF Token
                'api_key[name]':
                  type: string
                'api_key[duration]':
                  oneOf:
                    - type: integer
                      description: days
                    - type: string
                      enum:
                        - never
                        - custom
                'api_key[expires_at]':
                  type: string
                  format: date-time
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '422':
          $ref: '#/components/responses/ExpectedError'
  '/api_keys/{id}.json':
    delete:
      summary: Delete API Key
      operationId: deleteAPIKey
      tags:
        - API Keys
      security:
        - browserAuth: []
          csrfToken: []
      description: 'Requires [browser authentication](#operations-Sessions-login) (username & password), as well as hourly password confirmations (reauthentication).'
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '204':
          description: Success
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/NotFound'
  '/api_keys/{id}/regenerate.json':
    post:
      summary: Regenerate API Key
      operationId: regenerateAPIKey
      tags:
        - API Keys
      security:
        - browserAuth: []
          csrfToken: []
      description: 'Requires [browser authentication](#operations-Sessions-login) (username & password), as well as hourly password confirmations (reauthentication).'
      parameters:
        - $ref: '#/components/parameters/idPath'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - authenticity_token
              properties:
                authenticity_token:
                  type: string
                  description: CSRF Token
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '422':
          $ref: '#/components/responses/ExpectedError'
  /artists.json:
    get:
      summary: Search Artists
      operationId: searchArtists
      tags:
        - Artists
      parameters:
        - $ref: '#/components/parameters/limitQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/idQuery'
        - name: 'search[order]'
          in: query
          schema:
            type: string
            enum:
              - id_asc
              - id_desc
              - updated_at
              - name
              - post_count
        - name: 'search[name]'
          in: query
          schema:
            type: string
        - name: 'search[group_name]'
          in: query
          schema:
            type: string
        - name: 'search[any_other_name_like]'
          in: query
          schema:
            type: string
        - name: 'search[any_name_matches]'
          in: query
          schema:
            type: string
        - name: 'search[any_name_or_url_matches]'
          in: query
          schema:
            type: string
        - name: 'search[url_matches]'
          in: query
          schema:
            type: string
        - name: 'search[creator_name]'
          in: query
          schema:
            type: string
        - name: 'search[creator_id]'
          in: query
          schema:
            type: integer
        - name: 'search[has_tag]'
          in: query
          schema:
            type: boolean
        - name: 'search[is_linked]'
          in: query
          schema:
            type: string
        - name: 'search[linked_user_id]'
          in: query
          schema:
            type: integer
        - name: 'search[linked_user_name]'
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/Artist'
                    - type: object
                      required:
                        - urls
                      properties:
                        urls:
                          type: array
                          items:
                            $ref: '#/components/schemas/ArtistUrl'
    post:
      summary: Create Artist
      operationId: createArtist
      tags:
        - Artists
      security:
        - basicAuth: []
      description: |
        `other_names` & `urls` are silently truncated to 25 entries.
        `notes` is silently truncated to the wiki page limit (250,000).
        Individual `other_names` are silently truncated to 100 characters.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - 'artist[name]'
              properties:
                'artist[name]':
                  type: string
                'artist[other_names]':
                  type: array
                  items:
                    type: string
                'artist[other_names_string]':
                  type: string
                'artist[url_string]':
                  type: string
                'artist[notes]':
                  type: string
                'artist[group_name]':
                  type: string
                'artist[linked_user_id]':
                  type: integer
                  nullable: true
                  description: Only usable for Janitor+
                'artist[is_locked]':
                  type: boolean
                  description: Only usable for Janitor+
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artist'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '422':
          $ref: '#/components/responses/ExpectedError'
  '/artists/{idOrName}.json':
    get:
      summary: Get Artist
      operationId: getArtist
      tags:
        - Artists
      parameters:
        - $ref: '#/components/parameters/idOrNamePath'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Artist'
                  - type: object
                    required:
                      - domains
                      - urls
                    properties:
                      domains:
                        type: array
                        items:
                          type: array
                          example:
                            - - e621.net
                              - 1
                          items:
                            oneOf:
                              - type: string
                              - type: integer
                      urls:
                        type: array
                        items:
                          $ref: '#/components/schemas/ArtistUrl'
        '404':
