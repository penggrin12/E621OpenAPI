                  type: boolean
                  description: You must be Moderator+.
                'post[is_comment_disabled]':
                  type: boolean
                  description: You must be Admin+.
                'post[is_status_locked]':
                  type: boolean
                  description: You must be Admin+.
                'post[locked_tags]':
