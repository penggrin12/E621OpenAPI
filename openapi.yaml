        - $ref: '#/components/parameters/idOrNamePath'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                'artist[name]':
                  type: string
                  description: Only usable for Janitor+
                'artist[other_names]':
                  type: array
                  items:
                    type: string
                'artist[other_names_string]':
                  type: string
                'artist[url_string]':
                  type: string
                'artist[notes]':
                  type: string
                'artist[group_name]':
                  type: string
                'artist[linked_user_id]':
                  type: integer
                  nullable: true
                  description: Only usable for Janitor+
                'artist[is_locked]':
                  type: boolean
                  description: Only usable for Janitor+
      responses:
        '204':
          description: Success
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ExpectedError'
    delete:
