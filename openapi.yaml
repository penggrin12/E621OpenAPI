        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - 'upload[tag_string]'
                - 'upload[rating]'
              properties:
                'upload[file]':
                  type: string
                  format: binary
                  description: Mutually exclusive with direct_url.
                'upload[direct_url]':
                  type: string
                  description: Mutually exclusive with file.
                'upload[source]':
                  type: string
                'upload[tag_string]':
                  type: string
