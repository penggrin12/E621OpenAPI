                'upload[locked_rating]':
                  type: boolean
                  description: Must be Privileged+ to use.
                'upload[locked_tags]':
                  type: string
                  description: Must be Admin+ to use.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - location
                  - post_id
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  location:
                    type: string
                  post_id:
